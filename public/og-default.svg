<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle Glow Accent -->
  <circle cx="200" cy="150" r="250" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="500" r="300" fill="#2563eb" opacity="0.1" filter="url(#glow)" />

  <!-- Grid Pattern -->
  <path d="M 0 100 L 1200 100 M 0 200 L 1200 200 M 0 300 L 1200 300 M 0 400 L 1200 400 M 0 500 L 1200 500" stroke="#334155" stroke-width="1" stroke-dasharray="4 8" opacity="0.3"/>
  <path d="M 200 0 L 200 630 M 400 0 L 400 630 M 600 0 L 600 630 M 800 0 L 800 630 M 1000 0 L 1000 630" stroke="#334155" stroke-width="1" stroke-dasharray="4 8" opacity="0.3"/>

  <!-- Main Content Container -->
  <g transform="translate(100, 140)">
    <!-- Badge -->
    <rect x="0" y="0" width="310" height="40" rx="20" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#60a5fa" letter-spacing="1">
      GLOBAL EQUITY ANALYTICS
    </text>

    <!-- Main Title -->
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="#ffffff" letter-spacing="-1">
      World Companies
    </text>
    <text x="0" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-1">
      by Market Cap
    </text>

    <!-- Subtitle -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">
      Real-Time Equity Valuations, Sector Treemaps &amp; ETF Analytics
    </text>

    <!-- Stats Pill Cards -->
    <g transform="translate(0, 290)">
      <rect x="0" y="0" width="220" height="70" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="24" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b">TOP EQUITIES</text>
      <text x="24" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#ffffff">100+ Listed</text>

      <rect x="240" y="0" width="220" height="70" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="264" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b">COUNTRIES</text>
      <text x="264" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#ffffff">22 Markets</text>

      <rect x="480" y="0" width="220" height="70" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="504" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b">GICS SECTORS</text>
      <text x="504" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#ffffff">11 Sectors</text>
    </g>
  </g>

  <!-- Domain Footer -->
  <text x="100" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#64748b">
    worldcompaniesmarketcap.com
  </text>
</svg>
